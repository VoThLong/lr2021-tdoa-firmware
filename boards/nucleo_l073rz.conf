# --- L073RZ (20KB RAM) Thrifty Config ---
CONFIG_DISPLAY=n
CONFIG_SSD1306=n

# Tắt tính năng không cần thiết để giảm RAM
CONFIG_DISPLAY=n
CONFIG_SSD1306=n
CONFIG_THREAD_STACK_INFO=n
CONFIG_THREAD_MONITOR=n
CONFIG_THREAD_NAME=n
CONFIG_STACK_SENTINEL=n

# Giảm cấu hình bộ nhớ để vừa với RAM 20KB
CONFIG_HEAP_MEM_POOL_SIZE=512
CONFIG_LOG_BUFFER_SIZE=512
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=256
CONFIG_ISR_STACK_SIZE=1024
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_USP_MAIN_THREAD_STACK_SIZE=1536

# Sử dụng Picolibc (Zephyr 4.2 chuẩn)
CONFIG_NEWLIB_LIBC=n
CONFIG_PICOLIBC=y

# In log ngay lập tức để debug lỗi treo cứng
CONFIG_LOG_MODE_IMMEDIATE=y